name: Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:

  check-juliaup:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        label: [
          x86_64-pc-windows-msvc-windowsstore,
          x86_64-pc-windows-msvc-windowsappinstaller,
          x86_64-pc-windows-gnu-msi,
          x86_64-pc-windows-gnu-msi,
          x86_64-apple-darwin,
          x86_64-unknown-linux-gnu,
          x86_64-unknown-linux-musl,
          x86_64-unknown-freebsd,
          i686-pc-windows-msvc-windowsstore,
          i686-pc-windows-msvc-windowsappinstaller,
          i686-pc-windows-gnu-msi,
          i686-unknown-linux-gnu,
          i686-unknown-linux-musl,
          aarch64-unknown-linux-gnu,
          aarch64-unknown-linux-musl,
          aarch64-apple-darwin
          ]
        include:
          - label: x86_64-pc-windows-msvc-windowsstore
            target: x86_64-pc-windows-msvc
            os: windows
            runner: windows-latest
            features: windowsstore,binjuliainstaller,binjulialauncher
            rustflags:
          - label: x86_64-pc-windows-msvc-windowsappinstaller
            target: x86_64-pc-windows-msvc
            os: windows
            runner: windows-latest
            features: windowsappinstaller,binjuliainstaller,binjulialauncher
            rustflags:
          - label: x86_64-pc-windows-gnu-msi
            target: x86_64-pc-windows-gnu
            os: windows
            runner: windows-latest
            features: windowsappinstaller,binjuliainstaller,binjulialauncher
            rustflags:
          - label: i686-pc-windows-gnu-msi
            target: i686-pc-windows-gnu
            os: windows
            runner: windows-latest
            features: windowsappinstaller,binjuliainstaller,binjulialauncher
            rustflags:
          - label: x86_64-apple-darwin
            target: x86_64-apple-darwin
            os: macos
            runner: macos-15-intel
            features: selfupdate,binjuliainstaller,binjulialauncher
            rustflags:
          - label: x86_64-unknown-linux-gnu
            target: x86_64-unknown-linux-gnu
            os: ubuntu
            runner: ubuntu-latest
            features: selfupdate,binjuliainstaller,binjulialauncher
            rustflags:
          - label: x86_64-unknown-linux-musl
            target: x86_64-unknown-linux-musl
            os: ubuntu
            runner: ubuntu-latest
            features: selfupdate,binjuliainstaller,binjulialauncher
            rustflags: -C target-feature=+crt-static
          - label: x86_64-unknown-freebsd
            target: x86_64-unknown-freebsd
            os: ubuntu
            runner: ubuntu-latest
            features: selfupdate,binjuliainstaller,binjulialauncher
            rustflags:
          - label: i686-pc-windows-msvc-windowsstore
            target: i686-pc-windows-msvc
            os: windows
            runner: windows-latest
            features: windowsstore,binjuliainstaller,binjulialauncher
            rustflags:
          - label: i686-pc-windows-msvc-windowsappinstaller
            target: i686-pc-windows-msvc
            os: windows
            runner: windows-latest
            features: windowsappinstaller,binjuliainstaller,binjulialauncher
            rustflags:
          - label: i686-unknown-linux-gnu
            target: i686-unknown-linux-gnu
            os: ubuntu
            runner: ubuntu-latest
            features: selfupdate,binjuliainstaller,binjulialauncher
            rustflags:
          - label: i686-unknown-linux-musl
            target: i686-unknown-linux-musl
            os: ubuntu
            runner: ubuntu-latest
            features: selfupdate,binjuliainstaller,binjulialauncher
            rustflags: -C target-feature=+crt-static
          - label: aarch64-unknown-linux-gnu
            target: aarch64-unknown-linux-gnu
            os: ubuntu
            runner: ubuntu-latest
            features: selfupdate,binjuliainstaller,binjulialauncher
            rustflags:
          - label: aarch64-unknown-linux-musl
            target: aarch64-unknown-linux-musl
            os: ubuntu
            runner: ubuntu-latest
            features: selfupdate,binjuliainstaller,binjulialauncher
            rustflags: -C target-feature=+crt-static
          - label: aarch64-apple-darwin
            target: aarch64-apple-darwin
            os: macos
            runner: macos-latest
            features: selfupdate,binjuliainstaller,binjulialauncher
            rustflags:
    steps:
    - uses: actions/checkout@v7
    - if: ${{ contains(matrix.target, '-musl') }}
      run: sudo apt-get install musl-tools
    - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      with:
        target: ${{matrix.target}}
    - if: ${{ matrix.os == 'ubuntu' }}
      uses: taiki-e/install-action@ace6ebe54a6a0c86dfb5f7764b17f793b6925bc3 # v2.82.3
      with:
        tool: cross
    - name: Check build
      uses: clechasseur/rs-cargo@b897b7d2f083c6274295825fdbd5a39b825c3f82 # v5.0.6
      with:
        command: check
        tool: ${{ matrix.os == 'ubuntu' && 'cross' || 'cargo' }}
        args: --release --bins --target ${{matrix.target}} --features ${{matrix.features}}
      env:
        CARGO_TARGET_x86_64-unknown-linux-musl: ${{matrix.rustflags}}
        CARGO_TARGET_i686-unknown-linux-musl: ${{matrix.rustflags}}
        CARGO_TARGET_aarch64-unknown-linux-musl: ${{matrix.rustflags}}
        AWS_LC_SYS_CMAKE_BUILDER: "1"

  test-juliaup:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        target: [
          x86_64-pc-windows-msvc,
          x86_64-pc-windows-gnu,
          x86_64-apple-darwin,
          x86_64-unknown-linux-gnu,
          x86_64-unknown-linux-musl,
          x86_64-unknown-freebsd,
          i686-pc-windows-msvc,
          i686-pc-windows-gnu,
          aarch64-apple-darwin,
          ]
        include:
          - target: x86_64-pc-windows-msvc
            os: windows
            runner: windows-latest
            features: dummy,binjulialauncher
            rustflags:
            toolchain: stable
          - target: x86_64-pc-windows-gnu
            os: windows
            runner: windows-latest
            features: dummy,binjulialauncher
            rustflags:
            toolchain: stable-gnu
          - target: x86_64-apple-darwin
            os: macos
            runner: macos-15-intel
            features: dummy,binjulialauncher
            rustflags:
            toolchain: stable
          - target: x86_64-unknown-linux-gnu
            os: ubuntu
            runner: ubuntu-latest
            features: dummy,binjulialauncher
            rustflags:
            toolchain: stable
          - target: x86_64-unknown-linux-musl
            os: ubuntu
            runner: ubuntu-latest
            features: dummy,binjulialauncher
            rustflags: -C target-feature=+crt-static
            toolchain: stable
          - target: x86_64-unknown-freebsd
            os: ubuntu
            runner: ubuntu-latest
            features: dummy,binjulialauncher
            rustflags:
            toolchain: stable
          - target: i686-pc-windows-msvc
            os: windows
            runner: windows-latest
            features: dummy,binjulialauncher
            rustflags:
            toolchain: stable
          - target: i686-pc-windows-gnu
            os: windows
            runner: windows-latest
            features: dummy,binjulialauncher
            rustflags:
            toolchain: stable-i686-gnu
          - target: aarch64-apple-darwin
            os: macos
            runner: macos-latest
            features: dummy,binjulialauncher
            rustflags:
            toolchain: stable
    steps:
    - uses: actions/checkout@v7
    - if: ${{ contains(matrix.target, '-musl') }}
      run: sudo apt-get install musl-tools
    - uses: egor-tensin/setup-mingw@41b837e47d7f85214629d255b9c4bc3fcbe9fd63 # v3.0
      if: ${{ contains(matrix.toolchain, 'stable-i686-gnu') }}
      with:
        platform: x86
        version: 12.2.0
    - name: Resolve toolchain from rust-toolchain.toml
      id: toolchain
      shell: bash
      run: |
        ver=$(grep '^channel = ' rust-toolchain.toml | sed 's/channel = "\(.*\)"/\1/')
        case "${{ matrix.toolchain }}" in
          stable-gnu) echo "name=${ver}-x86_64-pc-windows-gnu" >> "$GITHUB_OUTPUT" ;;
          stable-i686-gnu) echo "name=${ver}-i686-pc-windows-gnu" >> "$GITHUB_OUTPUT" ;;
          *) echo "name=${ver}" >> "$GITHUB_OUTPUT" ;;
        esac
    - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      if: ${{ ! contains(matrix.target, 'freebsd') }}
      with:
        toolchain: ${{ steps.toolchain.outputs.name }}
        target: ${{matrix.target}}
    - name: Test
      if: ${{ ! contains(matrix.target, 'freebsd') }}
      run: cargo test --target ${{matrix.target}} --features ${{matrix.features}}
      env:
        CARGO_TARGET_x86_64-unknown-linux-musl: ${{matrix.rustflags}}
        CARGO_TARGET_i686-unknown-linux-musl: ${{matrix.rustflags}}
        CARGO_TARGET_aarch64-unknown-linux-musl: ${{matrix.rustflags}}
    - name: Free Disk Space
      if: ${{ contains(matrix.target, 'freebsd') }}
      uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
      with:
        tool-cache: true
        # Removing "large packages" alone takes a couple of minutes, it could
        # be switched to true if more space is needed (it'd save ~5 GB or so)
        large-packages: false
    - name: Test FreeBSD
      if: ${{ contains(matrix.target, 'freebsd') }}
      uses: cross-platform-actions/action@5ea7e8e4677bd726033a10b094ba1c5762b15dee # v1.3.0
      with:
        operating_system: freebsd
        version: '13.4'
        architecture: x86-64
        cpu_count: 4
        memory: '12G'
        sync_files: runner-to-vm
        shell: sh
        run: |
          df -h
          RUST_VERSION=$(grep '^channel = ' rust-toolchain.toml | sed 's/channel = "\(.*\)"/\1/')
          fetch https://sh.rustup.rs -o - | sh -s -- -y --default-toolchain "$RUST_VERSION" --profile minimal
          . "${HOME}/.cargo/env"
          export RUST_BACKTRACE=full
          # Clean up to maximize available disk space
          rm -rf target
          rm -rf ~/.cargo/registry/cache
          rm -rf ~/.cargo/git/db
          pkg clean -y
          df -h
          export CARGO_INCREMENTAL=0
          cargo test --verbose --target ${{matrix.target}} --features ${{matrix.features}}

  test-selfupdate:
    # Exercises the real `juliaup self update` code path end-to-end against a
    # local mock server (see tests/command_selfupdate_test.rs, issue #805).
    # Runs in its own job because it needs the `selfupdate` feature, which
    # changes config loading in a way that is incompatible with the other
    # integration tests.
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu
            runner: ubuntu-latest
          - os: macos
            runner: macos-latest
    steps:
    - uses: actions/checkout@v7
    - name: Resolve toolchain from rust-toolchain.toml
      id: toolchain
      shell: bash
      run: |
        ver=$(grep '^channel = ' rust-toolchain.toml | sed 's/channel = "\(.*\)"/\1/')
        echo "name=${ver}" >> "$GITHUB_OUTPUT"
    - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      with:
        toolchain: ${{ steps.toolchain.outputs.name }}
    - name: Test self update
      run: cargo test --features selfupdate,binjulialauncher --test command_selfupdate_test

